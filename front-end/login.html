<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Know Your Worth</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2>Welcome Back 👋</h2>
      <p class="auth-sub">Login to continue predicting your salary growth</p>

      <input id="email" type="email" placeholder="Email" />
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" required />
        <span id="togglePassword" class="toggle-password">👁️</span>
      </div>

      <button id="loginBtn">Login</button>
      <p id="authMsg"></p>

      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
      ? "http://127.0.0.1:5000"
      : "https://salarypredictor-x2c5.onrender.com";  // ← UPDATE THIS

    const passwordInput  = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    togglePassword.addEventListener("click", () => {
      const hidden = passwordInput.type === "password";
      passwordInput.type    = hidden ? "text" : "password";
      togglePassword.textContent = hidden ? "🙈" : "👁️";
    });

    document.getElementById("loginBtn").onclick = async () => {
      const email    = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const msg      = document.getElementById("authMsg");

      if (!email || !password) {
        msg.style.color = "#dc2626";
        msg.innerText = "Please enter email and password";
        return;
      }

      msg.style.color = "#2563eb";
      msg.innerText   = "Logging in…";

      try {
        const res  = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("email", data.email);
          window.location.href = "index.html";
        } else {
          msg.style.color = "#dc2626";
          msg.innerText   = data.message || "Login failed";
        }
      } catch {
        msg.style.color = "#dc2626";
        msg.innerText   = "Server not reachable. Please try again later.";
      }
    };
  </script>
</body>
</html>
